# GitLab CI/CD — Next.js + Prisma
# Секреты (AUTH_SECRET, DATABASE_URL для деплоя) задавайте в Settings → CI/CD → Variables.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - test
  - build

variables:
  NODE_VERSION: "20"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  # Заглушки только для сборки в CI (не использовать в продакшене)
  DATABASE_URL: "postgresql://gitlab:gitlab@localhost:5432/gitlab_ci"
  AUTH_SECRET: "gitlab-ci-build-secret"

default:
  image: node:${NODE_VERSION}-bookworm-slim
  interruptible: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

lint:
  stage: test
  script:
    - npm run lint

typecheck:
  stage: test
  script:
    - npx tsc --noEmit

prisma:validate:
  stage: test
  script:
    - npx prisma validate

build:
  stage: build
  needs:
    - lint
    - typecheck
    - prisma:validate
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 week
